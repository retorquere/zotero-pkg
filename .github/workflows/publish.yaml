name: Release Zotero/Juris-M .deb packages

on:
  schedule:
    - cron: 0 */2 * * *
  push:
  workflow_dispatch:
    inputs:
      build:
        description: forced rebuild
        type: boolean
        required: false
        default: false
      publish:
        description: forced publish
        type: boolean
        required: false
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rebuild:
    runs-on: ubuntu-latest
    # runs-on: ubuntu-20.04
    steps:
    - uses: actions/checkout@v6

    - name: import GPG key
      uses: retorquere/ghaction-import-gpg@rebase
      with:
        gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}

    - name: install build requirements
      run: |
        sudo apt-get -q update
        sudo apt-get -qy install devscripts fakeroot moreutils pandoc imagemagick

    - name: install nfpm
      run: |
        echo 'deb [trusted=yes] https://repo.goreleaser.com/apt/ /' | sudo tee /etc/apt/sources.list.d/goreleaser.list
        sudo apt update
        sudo apt install nfpm

    - name: install rclone
      run: curl https://rclone.org/install.sh | sudo bash

    - name: configure rclone
      run: |
        mkdir -p ~/.config/rclone
        cat <<EOF > ~/.config/rclone/rclone.conf

        [b2-apt-package-archive]
        type = b2
        account = ${{ secrets.B2_APPLICATION_KEY_ID }}
        key = ${{ secrets.B2_APPLICATION_KEY }}
        hard_delete = true
        download_url = https://zotero.retorque.re
        EOF

    - name: install node
      uses: actions/setup-node@v6
      with:
        node-version: 24.x
    - name: install node packages
      run: npm install --no-package-lock && npm ls

    - name: Restore repo cache
      uses: actions/cache/restore@v5
      with:
        path: apt/
        key: zotero-repo-last-known
        restore-keys: |
          zotero-repo-

    - name: rebuild
      id: rebuild
      run: make
      env:
        BUILD: ${{ github.event.inputs.build }}
        PUBLISH: ${{ github.event.inputs.publish }}

    - name: show status
      run: echo publish=${{ steps.rebuild.outputs.updated }}

    - name: publish repo
      if: steps.rebuild.outputs.updated == 'true'
      run: |
        rclone sync apt b2-apt-package-archive:apt-package-archive -v
        rclone cleanup b2-apt-package-archive:apt-package-archive -v

    - name: Generate cache content hash
      id: hash
      run: |
        echo "new_hash=$(sha256sum apt/*.deb | sha256sum | cut -d' ' -f1)" >> $GITHUB_OUTPUT
    - name: Save cache
      continue-on-error: true
      if: steps.rebuild.outputs.updated == 'true'
      uses: actions/cache/save@v4
      with:
        path: apt/
        key: zotero-repo-${{ steps.hash.outputs.hash }}

  install:
    needs: rebuild
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mode: [ 'list', 'sources' ]
    outputs:
      status: success
    steps:
    - name: allow cloudflare CDN time to settle
      run: sleep 60

    - uses: actions/checkout@v6

    - name: install python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: install apt repo
      run: |
        export INSTALLSH=https://raw.githubusercontent.com/retorquere/zotero-deb/master/install.sh
        echo INSTALLSH=$INSTALLSH
        curl -sL $INSTALLSH | tee install.sh | sudo bash -s -- -m ${{ matrix.mode }}
        echo ==== install.sh ===
        cat install.sh
        echo ==== zotero.${{ matrix.mode }} ===
        cat /etc/apt/sources.list.d/zotero.${{ matrix.mode }}

    - name: install all the things
      run: |
        pip install -r requirements.txt
        sudo apt -y clean
        sudo apt -y update
        sudo apt -y install desktop-file-utils zotero zotero-beta xvfb libegl1 libgl1 libdbus-glib-1-2
        dpkg -l | grep zotero

        for c in zotero zotero-beta; do
          ./start.py $c
          desktop-file-validate /usr/share/applications/$c.desktop && echo 'all clear!'
        done
